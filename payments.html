<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments - Smart Tailor</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <link rel="stylesheet" href="css/payments.css"/>
</head>

<body>

  <div class="sidebar">
    <div class="logo">
      <i class="fa-solid fa-shirt"></i>
      <div>
        <h2>SMART TAILOR</h2>
        <p>SYSTEM</p>
      </div>
    </div>

    <ul class="menu">
      <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
      <li><a href="neworder.html"><i class="fa-solid fa-scissors"></i> New order+</a></li>
      <li><a href="measurements.html"><i class="fa-solid fa-ruler"></i> Measurements</a></li>
      <li><a href="orders.html"><i class="fa-solid fa-cart-shopping"></i> Orders</a></li>
      <li class="active"><a href="payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
      
      <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
      <li class="logout">
    <a href="#" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout
    </a>
  </li>

    </ul>
  </div>

  <div class="main">

    <div class="title">Payment System</div>

    <div class="wrapper">

      <!-- LEFT FORM -->
      <div class="form">

        <!-- 🔥 NEW: SEARCH BAR (PHONE / NAME / TOKEN) -->
        <label>Search Customer (Name / Phone )</label>
        <input type="text" id="searchBox" placeholder="Search..." oninput="searchCustomer()">

        <!-- CUSTOMER SELECT -->
        <label>Select Customer</label>
        <select id="customerSelect" onchange="fillCustomerData()">
          <option value="">-- Select Customer --</option>
        </select>

        <!-- TOKEN SEARCH (NEW FEATURE) -->
        <label>Order Token</label>
        <input type="text" id="tokenSearch" placeholder="Enter Token (e.g #0001)" onblur="searchByToken()">

        <div class="row">
          <div>
            <label>Total Amount</label>
            <input type="number" id="total" oninput="calculateRemaining()">
          </div>

          <div>
            <label>Advance Paid</label>
            <input type="number" id="paid" oninput="calculateRemaining()">
          </div>
        </div>

        <div class="row">
          <div>
            <label>Remaining</label>
            <input type="number" id="remaining" readonly>
          </div>

          <div>
            <label>Status</label>
            <input type="text" id="status" value="Pending" readonly>
          </div>
        </div>

        <label>Payment Date</label>
        <input type="date" id="date">

        <label>Notes</label>
        <textarea id="notes"></textarea>

        <div class="btns">
          <button class="save" onclick="savePayment()">Save Payment</button>
          <button class="reset" onclick="resetForm()">Reset</button>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right">

        <div class="card">
          <h3>Invoice Preview</h3>

          <div class="invoice">
            <p><b>Invoice No:</b> <span id="invNo">-</span></p>
            <p><b>Customer:</b> <span id="invName">-</span></p>
            <p><b>Phone:</b> <span id="invPhone">-</span></p>
            <p><b>Token:</b> <span id="invToken">-</span></p>
            <p><b>Dress:</b> <span id="invDress">-</span></p>
            <p><b>Total:</b> Rs. <span id="invTotal">0</span></p>
            <p><b>Paid:</b> Rs. <span id="invPaid">0</span></p>
            <p><b>Remaining:</b> Rs. <span id="invRemain">0</span></p>
            <p><b>Status:</b> <span id="invStatus">Pending</span></p>
          </div>

        </div>

        <div class="card">
          <h3>Recent Payments</h3>
          <div id="paymentList"></div>
        </div>

      </div>

    </div>
  </div>

  <script src="js/payments.js"></script>
</body>
</html>
